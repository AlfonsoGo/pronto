name: pronto
description: >-
  Pronto — dictado de voz por IA, open source, para escribir más rápido.
  Whisper on-device (whisper.cpp), español primero y luego multilingüe,
  dictado global en cualquier aplicación, con sistema de automejora que
  aprende de tus correcciones.
publish_to: "none"
version: 0.4.1+14

environment:
  sdk: ">=3.4.0 <4.0.0"
  flutter: ">=3.24.0"

# NOTA SOBRE VERSIONES:
# Las versiones de abajo son orientativas (verificadas a mediados de 2026).
# Tras `flutter pub get`, si alguna no resuelve ejecuta:
#   flutter pub upgrade --major-versions
# y ajusta. Ver SETUP.md.
dependencies:
  flutter:
    sdk: flutter

  # Estado
  flutter_riverpod: ^2.5.1

  # FFI / Win32 (atajo global + inyección de texto)
  ffi: ^2.1.3
  win32: ^5.5.4

  # Captura de audio (PCM16 16 kHz mono en stream).
  # 7.x usa la federación 2.x (record_linux/record_windows/interface alineados);
  # las 5.x/6.x tenían record_linux desfasado que rompía la compilación.
  record: ^7.0.0

  # Persistencia (SQLite sin codegen) + utilidades de ruta
  sqlite3: ^2.4.6
  sqlite3_flutter_libs: ^0.5.24
  path: ^1.9.0
  path_provider: ^2.1.4
  shared_preferences: ^2.3.2

  # Ventana / overlay / bandeja / autostart (ecosistema leanflutter)
  window_manager: ^0.4.2
  tray_manager: ^0.3.0
  launch_at_startup: ^0.3.0

  # LLM de post-corrección opcional (Ollama local o nube)
  http: ^1.2.2

  # Versión actual de la app (para el auto-actualizador desde GitHub Releases).
  package_info_plus: ^8.0.0

  # Motor de voz ALTERNATIVO: NVIDIA Parakeet (transducer) vía sherpa-onnx.
  # Trae las DLLs nativas de Windows prebuilt (dep transitiva sherpa_onnx_windows),
  # así el build de Flutter las empaqueta solo. Seleccionable en Ajustes.
  sherpa_onnx: ^1.13.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/
    - assets/branding/
